<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Queue tracks — two parallel lines converging into the chevron -->
  <line x1="6"  y1="12.5" x2="19" y2="12.5" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="6"  y1="19.5" x2="19" y2="19.5" stroke="rgba(255,255,255,0.6)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Chevron — the "processing" tip -->
  <polyline points="19,12.5 24.5,16 19,19.5"
            stroke="white" stroke-width="2.4"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Agent pulse dot at the tip -->
  <circle cx="24.5" cy="16" r="3" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="24.5" cy="16" r="1.5" fill="white"/>
</svg>
