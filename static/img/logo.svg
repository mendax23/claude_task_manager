<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark -->
  <rect width="44" height="44" rx="11" fill="url(#bg)"/>
  <line x1="8"  y1="17" x2="26" y2="17" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="8"  y1="27" x2="26" y2="27" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="26,17 33,22 26,27"
            stroke="white" stroke-width="3"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="33" cy="22" r="4" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="33" cy="22" r="2" fill="white"/>

  <!-- Wordmark -->
  <text x="55" y="28.5"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="17"
        font-weight="700"
        letter-spacing="-0.3"
        fill="white">AgentQueue</text>
</svg>
