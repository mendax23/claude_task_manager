{% extends "base.html" %}
{% block title %}404 — AgentQueue{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="w-20 h-20 rounded-2xl bg-gray-900 border border-gray-800 flex items-center justify-center mb-6">
    <svg class="w-10 h-10 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </div>
  <h1 class="text-3xl font-bold text-white mb-2">404</h1>
  <p class="text-gray-500 mb-6 max-w-sm">The page you're looking for doesn't exist or has been moved.</p>
  <div class="flex items-center gap-3">
    <a href="{% url 'dashboard:index' %}"
       class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl transition-colors font-medium">
      Back to Dashboard
    </a>
    <button onclick="history.back()"
            class="text-sm text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 px-5 py-2.5 rounded-xl transition-colors">
      Go Back
    </button>
  </div>
</div>
{% endblock %}
