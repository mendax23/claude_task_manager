<div class="flex flex-col h-full" x-data="$store.agentqueue">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
    <h3 class="font-semibold text-sm">Live Output</h3>
    <button @click="outputPanelOpen = false; activeOutputTaskId = null"
            class="text-gray-500 hover:text-gray-300">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Output stream -->
  <div class="flex-1 overflow-y-auto p-4 font-mono text-xs text-green-400 bg-gray-950/50"
       id="output-stream"
       x-ref="outputStream">
    <template x-for="chunk in outputChunks" :key="chunk.id">
      <span x-text="chunk.text" class="whitespace-pre-wrap"></span>
    </template>
    <span class="animate-pulse">▊</span>
  </div>
</div>
