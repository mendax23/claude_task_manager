<!-- Live Output Panel (slide-over) -->
<div class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
  <h2 class="text-sm font-medium text-white">Live Output</h2>
  <button @click="open = false" class="text-gray-500 hover:text-white transition-colors">&times;</button>
</div>

<div class="flex-1 overflow-y-auto p-4">
  <pre class="text-xs text-green-400 font-mono whitespace-pre-wrap leading-relaxed"
       id="live-output-content"
       x-text="taskId && $store.agentqueue.activeTasks[taskId]?.outputLog || 'No output yet...'">
  </pre>
</div>
