<div class="flex flex-col min-h-[600px]">
  <!-- Column header -->
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-medium text-gray-400 uppercase tracking-wide">
      {{ column.label }}
    </h2>
    <span class="bg-gray-800 text-gray-500 text-xs px-2 py-0.5 rounded-full">
      {{ column.tasks|length }}
    </span>
  </div>

  <!-- Task cards drop zone -->
  <div class="kanban-column flex-1 space-y-2 rounded-xl p-2 min-h-[200px] bg-gray-900/50"
       data-status="{{ column.key }}"
       id="column-{{ column.key }}">
    {% for task in column.tasks %}
      {% include "components/task_card.html" with task=task %}
    {% empty %}
      <div class="text-center text-gray-700 text-sm py-8 select-none">Drop tasks here</div>
    {% endfor %}
  </div>
</div>
