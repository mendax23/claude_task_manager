<div class="bg-gray-900/70 border-b border-gray-800/60 px-10 py-2.5 flex items-center gap-8"
     style="font-size: .78rem;"
     id="token-budget-bar"
     hx-get="{% url 'dashboard:budget_bar' %}"
     hx-trigger="every 30s"
     hx-swap="outerHTML">

  {% if budget %}
  <div class="flex items-center gap-3" x-data="{ get pct() { return $store.agentqueue.tokenBudget.pctUsed || {{ budget.pct_used|floatformat:0 }}; } }">
    <span class="text-gray-500 font-medium tracking-wide uppercase hidden sm:inline" style="font-size: .65rem; letter-spacing: .08em;">Tokens</span>
    <div class="w-20 sm:w-28 h-1.5 bg-gray-800 rounded-full overflow-hidden"
         role="progressbar" :aria-valuenow="pct" aria-valuemin="0" aria-valuemax="100" aria-label="Weekly token budget usage">
      <div class="h-full rounded-full transition-all duration-700"
           :class="{
             'bg-green-500':  pct < 50,
             'bg-yellow-500': pct >= 50 && pct < 75,
             'bg-orange-500': pct >= 75 && pct < 90,
             'bg-red-500':    pct >= 90
           }"
           :style="`width: ${pct}%`">
      </div>
    </div>
    <span class="font-bold tabular-nums"
          :class="{
            'text-green-400':  pct < 50,
            'text-yellow-400': pct >= 50 && pct < 75,
            'text-orange-400': pct >= 75 && pct < 90,
            'text-red-400':    pct >= 90
          }"
          x-text="`${pct.toFixed(0)}%`"
          :title="`${($store.agentqueue.tokenBudget.weeklyUsed || {{ budget.tokens_used_this_week }}).toLocaleString()} / ${($store.agentqueue.tokenBudget.weeklyLimit || {{ budget.weekly_limit }}).toLocaleString()} tokens`">
      {{ budget.pct_used|floatformat:0 }}%
    </span>
    <span class="hidden lg:inline text-gray-700 tabular-nums"
          style="font-size: .65rem;"
          x-text="`${(($store.agentqueue.tokenBudget.weeklyUsed || {{ budget.tokens_used_this_week }}) / 1000).toFixed(0)}k / ${(($store.agentqueue.tokenBudget.weeklyLimit || {{ budget.weekly_limit }}) / 1000).toFixed(0)}k`">
      {{ budget.tokens_used_this_week }}/ {{ budget.weekly_limit }}
    </span>
  </div>
  {% else %}
  <div class="flex items-center gap-2 text-gray-600">
    Budget: <a href="{% url 'scheduling:budget' %}" class="text-indigo-500 hover:text-indigo-400">configure</a>
  </div>
  {% endif %}

  <span class="hidden bg-orange-500/15 border border-orange-500/30 text-orange-400 px-2.5 py-0.5 rounded-lg font-semibold animate-pulse"
        :class="{ '!inline': $store.agentqueue.tokenBudget.drainMode }">
    ⚡ Drain Mode
  </span>

  <div class="flex items-center gap-2 text-gray-500">
    Running
    <span class="text-gray-200 font-bold tabular-nums"
          x-text="Object.values($store.agentqueue.activeTasks).filter(t=>t.status==='in_progress').length">0</span>
  </div>

  <div class="flex-1"></div>

  <div class="flex items-center gap-2">
    <div class="w-2 h-2 rounded-full"
         :class="$store.agentqueue.isIdle ? 'bg-emerald-400 animate-pulse' : 'bg-gray-600'"></div>
    <span class="font-semibold"
          :class="$store.agentqueue.isIdle ? 'text-emerald-400' : 'text-gray-500'"
          x-text="$store.agentqueue.isIdle ? 'Idle' : 'Active'">
      {% if is_idle %}Idle{% else %}Active{% endif %}
    </span>
  </div>

  {% if schedule %}
  <button hx-post="{% url 'scheduling:toggle' %}"
          hx-target="#token-budget-bar"
          hx-swap="outerHTML"
          title="{% if schedule.is_active %}Pause auto-scheduler{% else %}Resume auto-scheduler{% endif %}"
          class="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-lg transition-colors
                 {% if schedule.is_active %}text-green-500/70 hover:text-green-400 hover:bg-green-900/20
                 {% else %}text-gray-600 hover:text-gray-400 hover:bg-gray-800{% endif %}">
    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      {% if schedule.is_active %}
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      {% else %}
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      {% endif %}
    </svg>
    {% if schedule.is_active %}Auto{% else %}Paused{% endif %}
  </button>
  {% endif %}

  <div class="flex items-center gap-1.5">
    <div class="w-1.5 h-1.5 rounded-full"
         :class="$store.agentqueue.wsConnected ? 'bg-green-500' : 'bg-red-500 animate-pulse'"></div>
    <span class="text-gray-600"
          x-text="$store.agentqueue.wsConnected ? 'Live' : 'Reconnecting'">Live</span>
  </div>
</div>
