{% extends "base.html" %}
{% block title %}Edit {{ provider.name }} — AgentQueue{% endblock %}
{% block content %}

<div class="max-w-xl">
  <div class="flex items-start gap-4 mb-8">
    <a href="{% url 'providers:list' %}"
       class="mt-1 w-8 h-8 flex items-center justify-center rounded-xl bg-gray-900 border border-gray-800
              text-gray-500 hover:text-white hover:border-gray-600 transition-colors shrink-0">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-white">Edit {{ provider.name }}</h1>
      <p class="text-sm text-gray-500 mt-0.5">{{ provider.get_provider_type_display }}</p>
    </div>
  </div>

  {% include "providers/_form.html" with form=form submit_label="Save Changes" %}
</div>

{% endblock %}
