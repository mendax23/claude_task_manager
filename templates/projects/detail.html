{% extends "base.html" %}
{% block title %}{{ project.name }} — AgentQueue{% endblock %}
{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="{% url 'projects:list' %}" class="text-gray-500 hover:text-white">&larr;</a>
  <h1 class="text-xl font-semibold text-white">{{ project.name }}</h1>
  <code class="text-xs text-gray-500 ml-2">{{ project.repo_path }}</code>
</div>

<div class="flex gap-3 mb-6">
  <a href="{% url 'tasks:create' %}" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg">+ New Task</a>
  <button hx-post="{% url 'projects:suggest' project.slug %}"
          hx-target="#suggestions-panel"
          hx-swap="innerHTML"
          class="border border-indigo-500 text-indigo-400 hover:bg-indigo-500/10 text-sm px-4 py-2 rounded-lg transition-colors">
    Suggest Tasks (AI)
  </button>
</div>

<!-- AI suggestions panel -->
<div id="suggestions-panel" class="mb-6"></div>

<!-- Tasks list -->
<div class="space-y-2">
  {% for task in tasks %}
  <div class="bg-gray-800 rounded-lg p-4 flex items-center gap-4">
    <span class="text-sm font-medium text-white flex-1">{{ task.title }}</span>
    <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-400">{{ task.status }}</span>
    <a href="{% url 'tasks:detail' task.pk %}" class="text-indigo-400 text-xs">View</a>
  </div>
  {% empty %}
  <p class="text-gray-600 text-sm text-center py-8">No tasks yet.</p>
  {% endfor %}
</div>
{% endblock %}
