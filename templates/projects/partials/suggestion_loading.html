<div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"
     x-data="{ done: false }"
     @suggestion-ready.window="done = true">

  <div x-show="!done" class="flex items-center gap-4 text-sm text-gray-400">
    <div class="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin shrink-0"></div>
    <div>
      <p class="text-white font-medium">Analyzing {{ project.name }}...</p>
      <p class="text-xs text-gray-500 mt-0.5">Reading README, git history, generating suggestions</p>
    </div>
  </div>

  <div x-show="done" x-cloak class="text-sm text-green-400">
    Suggestions ready — check the notifications panel.
  </div>
</div>
