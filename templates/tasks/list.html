{% extends "base.html" %}
{% block title %}Tasks — AgentQueue{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-xl font-semibold">Tasks</h1>
  <a href="{% url 'tasks:create' %}" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-2 rounded-lg">+ New Task</a>
</div>
<div class="space-y-2">
  {% for task in tasks %}
    <div class="bg-gray-800 rounded-lg p-4 flex items-center gap-4">
      <span class="text-sm font-medium text-white flex-1">{{ task.title }}</span>
      <span class="text-xs text-gray-400">{{ task.project.name }}</span>
      <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-400">{{ task.status }}</span>
      <a href="{% url 'tasks:detail' task.pk %}" class="text-indigo-400 hover:text-indigo-300 text-xs">View</a>
    </div>
  {% empty %}
    <p class="text-gray-500 text-center py-12">No tasks yet. <a href="{% url 'tasks:create' %}" class="text-indigo-400">Create one</a></p>
  {% endfor %}
</div>
{% endblock %}
