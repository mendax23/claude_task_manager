{% load humanize %}
<div x-data="{
  priority: '{{ task.priority }}',
  taskType: '{{ task.task_type }}'
}" class="p-5">

  <form hx-post="{% url 'tasks:edit' task.pk %}"
        hx-target="#task-detail-body"
        hx-swap="innerHTML">
    {% csrf_token %}

    <div class="flex items-center gap-2 mb-4">
      <div class="w-5 h-5 rounded bg-gray-800 border border-gray-700 flex items-center justify-center">
        <svg class="w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </div>
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Edit Task</p>
    </div>

    <div class="space-y-4">

      {# Title #}
      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Title</label>
        <input type="text" name="title" value="{{ task.title }}"
               class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white
                      focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/40 transition-colors">
      </div>

      {# Priority #}
      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Priority</label>
        <div class="flex gap-1.5">
          <template x-for="[val, label, cls] in [
            ['1', 'Low', 'hover:border-slate-500'],
            ['2', 'Med', 'hover:border-blue-500'],
            ['3', 'High', 'hover:border-amber-500'],
            ['4', 'Urgent', 'hover:border-red-500']
          ]" :key="val">
            <button type="button" @click="priority = val"
                    :class="priority == val
                      ? (val=='1' ? 'bg-slate-700 border-slate-500 text-white' :
                         val=='2' ? 'bg-blue-700 border-blue-500 text-white' :
                         val=='3' ? 'bg-amber-700 border-amber-500 text-white' :
                                    'bg-red-700 border-red-500 text-white')
                      : 'bg-gray-800 border-gray-700 text-gray-500'"
                    class="flex-1 border rounded-lg py-1.5 text-xs font-medium transition-all"
                    :class="cls"
                    x-text="label">
            </button>
          </template>
        </div>
        <input type="hidden" name="priority" :value="priority">
      </div>

      {# Tags #}
      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Tags</label>
        <input type="text" name="tags_input" value="{{ task.tags|join:', ' }}"
               placeholder="python, tests, refactor"
               class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white
                      placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors">
      </div>

      {# Project #}
      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Project</label>
        <div class="relative">
          <select name="project"
                  class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white
                         focus:outline-none focus:border-indigo-500 appearance-none transition-colors">
            <option value="">— No project —</option>
            {% for p in projects %}
            <option value="{{ p.pk }}" {% if task.project_id == p.pk %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </div>
      </div>

      {# Prompt #}
      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Prompt</label>
        <textarea name="prompt" rows="6"
                  class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white
                         focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/40
                         transition-colors resize-none leading-relaxed">{{ task.prompt }}</textarea>
      </div>

      {# hidden fields needed by form #}
      <input type="hidden" name="task_type" :value="taskType">
      <input type="hidden" name="estimated_tokens" value="{{ task.estimated_tokens }}">

    </div>

    <div class="flex items-center gap-2 mt-5 pt-4 border-t border-gray-800">
      <button type="submit"
              class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold
                     py-2 rounded-lg transition-colors">
        Save Changes
      </button>
      <button type="button"
              hx-get="{% url 'tasks:detail' task.pk %}?partial=panel"
              hx-target="#task-detail-body"
              hx-swap="innerHTML"
              class="px-4 py-2 text-xs text-gray-500 hover:text-gray-300 rounded-lg hover:bg-gray-800 transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
