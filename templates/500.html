<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — AgentQueue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>* { box-sizing: border-box; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased flex items-center justify-center p-4">
  <div class="text-center max-w-md">
    <div class="w-20 h-20 rounded-2xl bg-gray-900 border border-gray-800 flex items-center justify-center mb-6 mx-auto">
      <svg class="w-10 h-10 text-red-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-white mb-2">500</h1>
    <p class="text-gray-500 mb-6">Something went wrong on our end. The error has been logged.</p>
    <div class="flex items-center gap-3 justify-center">
      <a href="/"
         class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl transition-colors font-medium">
        Back to Dashboard
      </a>
      <button onclick="location.reload()"
              class="text-sm text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 px-5 py-2.5 rounded-xl transition-colors">
        Try Again
      </button>
    </div>
  </div>
</body>
</html>
