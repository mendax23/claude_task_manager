<!DOCTYPE html>
<html lang="en" x-data style="font-size: 20px;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgentQueue{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontSize: {
            'xs':   ['0.7rem',  { lineHeight: '1.1rem'  }],
            'sm':   ['0.82rem', { lineHeight: '1.25rem' }],
            'base': ['1rem',    { lineHeight: '1.6rem'  }],
            'lg':   ['1.15rem', { lineHeight: '1.75rem' }],
            'xl':   ['1.3rem',  { lineHeight: '1.85rem' }],
            '2xl':  ['1.6rem',  { lineHeight: '2.1rem'  }],
            '3xl':  ['2rem',    { lineHeight: '2.5rem'  }],
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.4/Sortable.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    [x-cloak] { display: none !important; }

    /* ── Kanban / card animations ── */
    @keyframes running-scanner {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(380%); }
    }
    @keyframes card-glow-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(245,158,11,.22), 0 4px 24px rgba(245,158,11,.07); }
      50%       { box-shadow: 0 0 0 1px rgba(245,158,11,.50), 0 8px 36px rgba(245,158,11,.20); }
    }
    @keyframes top-scanner {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(500%); }
    }
    @keyframes card-shimmer {
      0%         { transform: translateX(-120%); opacity: 0; }
      8%, 92%    { opacity: 1; }
      100%       { transform: translateX(250%); opacity: 0; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .running-card-glow { animation: card-glow-pulse 2.8s ease-in-out infinite; }
    .running-scanner   { animation: running-scanner 1.8s ease-in-out infinite; }
    .top-scanner       { animation: top-scanner 2.8s ease-in-out infinite; }
    .card-shimmer      { animation: card-shimmer 5s ease-in-out infinite 1.5s; }
    .cursor-blink      { animation: cursor-blink 1.1s ease-in-out infinite; }
    .task-card         { animation: fadeSlideIn .25s ease-out; }

    .sortable-ghost { opacity: 0.30; transform: scale(0.96); border: 2px dashed rgba(99,102,241,.4) !important; background: rgba(99,102,241,.05) !important; }
    .sortable-drag  { transform: rotate(1.5deg) scale(1.02); box-shadow: 0 28px 56px rgba(0,0,0,.6); }

    /* ── HTMX ── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }

    /* ── Global form inputs — catches all {{ field }} widgets ── */
    main input[type=text],
    main input[type=number],
    main input[type=url],
    main input[type=email],
    main input[type=password],
    main input[type=search],
    main input[type=date],
    main input[type=time] {
      width: 100%;
      background: rgb(31,41,55);
      border: 1px solid rgba(75,85,99,.7);
      border-radius: .875rem;
      padding: .8rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    main select {
      width: 100%;
      background: rgb(31,41,55);
      border: 1px solid rgba(75,85,99,.7);
      border-radius: .875rem;
      padding: .8rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    main textarea {
      width: 100%;
      background: rgb(31,41,55);
      border: 1px solid rgba(75,85,99,.7);
      border-radius: .875rem;
      padding: .9rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      resize: vertical;
      transition: border-color .15s, box-shadow .15s;
    }
    main input:focus, main select:focus, main textarea:focus {
      border-color: rgb(99,102,241);
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }
    main input::placeholder, main textarea::placeholder {
      color: rgba(107,114,128,.7);
    }

    /* ── Nav ── */
    .nav-link { position: relative; display: flex; align-items: center; height: 100%; padding: 0 1rem; font-size: .85rem; font-weight: 500; transition: color .15s; }
    .nav-link:not(.nav-active) { color: rgba(156,163,175,1); }
    .nav-link:not(.nav-active):hover { color: white; }
    .nav-active { color: white; }
    .nav-active::after {
      content: '';
      position: absolute;
      bottom: 0; left: .75rem; right: .75rem;
      height: 2px;
      background: rgb(99,102,241);
      border-radius: 2px 2px 0 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(75,85,99,.5); border-radius: 9999px; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  {% include "components/token_budget_bar.html" %}

  <!-- NAV -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-20 flex items-stretch px-8" style="height: 62px;">
    <!-- Logo -->
    <a href="{% url 'dashboard:index' %}" class="flex items-center gap-3 mr-8 shrink-0">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"
           class="shadow-lg shadow-indigo-900/60" style="border-radius: 9px; flex-shrink:0;">
        <defs>
          <linearGradient id="aq-bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop stop-color="#312E81"/>
            <stop offset="1" stop-color="#6D28D9"/>
          </linearGradient>
          <filter id="aq-glow">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="32" height="32" rx="8" fill="url(#aq-bg)"/>
        <line x1="6"  y1="12.5" x2="19" y2="12.5" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="6"  y1="19.5" x2="19" y2="19.5" stroke="rgba(255,255,255,0.6)" stroke-width="2.4" stroke-linecap="round"/>
        <polyline points="19,12.5 24.5,16 19,19.5" stroke="white" stroke-width="2.4"
                  fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24.5" cy="16" r="3" fill="#FBBF24" filter="url(#aq-glow)"/>
        <circle cx="24.5" cy="16" r="1.5" fill="white"/>
      </svg>
      <span class="font-bold text-white" style="font-size: 1.05rem; letter-spacing: -.01em;">AgentQueue</span>
    </a>

    <!-- Links -->
    <a href="{% url 'dashboard:index' %}"
       class="nav-link {% if request.path == '/' %}nav-active{% endif %}">Dashboard</a>
    <a href="{% url 'projects:list' %}"
       class="nav-link {% if 'projects' in request.path %}nav-active{% endif %}">Projects</a>
    <a href="{% url 'tasks:list' %}"
       class="nav-link {% if 'tasks' in request.path %}nav-active{% endif %}">Tasks</a>
    <a href="{% url 'scheduling:settings' %}"
       class="nav-link {% if 'scheduling' in request.path %}nav-active{% endif %}">Schedule</a>
    <a href="{% url 'providers:list' %}"
       class="nav-link {% if 'providers' in request.path %}nav-active{% endif %}">Providers</a>

    <div class="flex-1"></div>
    <a href="/admin/" class="nav-link text-gray-600 hover:text-gray-400" style="font-size: .75rem;">
      Admin ↗
    </a>
  </nav>

  <main class="px-6 py-8 w-full">
    {% block content %}{% endblock %}
  </main>

  <!-- Toasts -->
  <div x-cloak class="fixed bottom-6 right-6 space-y-2 z-50" style="min-width: 320px;"
       x-show="$store.agentqueue.notifications.length > 0">
    <template x-for="(n, i) in $store.agentqueue.notifications" :key="i">
      <div class="flex items-start gap-3 rounded-2xl px-5 py-4 shadow-2xl border"
           :class="n.type==='error'
             ? 'bg-red-950/90 border-red-700/50'
             : n.type==='success'
             ? 'bg-green-950/80 border-green-700/40'
             : 'bg-gray-800 border-gray-700'"
           x-transition:enter="transition ease-out duration-250"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0">
        <div class="w-2 h-2 rounded-full mt-1.5 shrink-0"
             :class="n.type==='error' ? 'bg-red-400' : n.type==='success' ? 'bg-green-400' : 'bg-indigo-400'"></div>
        <span class="text-sm flex-1 leading-snug"
              :class="n.type==='error' ? 'text-red-200' : n.type==='success' ? 'text-green-200' : 'text-gray-200'"
              x-text="n.message"></span>
        <button @click="$store.agentqueue.notifications.splice(i,1)"
                class="text-gray-600 hover:text-white transition-colors ml-2 mt-0.5 shrink-0">✕</button>
      </div>
    </template>
  </div>

  <script src="/static/js/app.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
